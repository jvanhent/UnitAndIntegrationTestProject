name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'
        cache: 'maven'
        
    - name: Perform Maven Release
      # Using -Darguments="-DskipITs=false" to run ITs in perform
      # Using -Dgoals=install to prevent the plugin from trying to run 'deploy'
      # which would fail without a <distributionManagement> block in pom.xml.
      run: mvn -B release:prepare release:perform -Dgoals=install
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
